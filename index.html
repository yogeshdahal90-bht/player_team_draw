<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>World Cup Draft</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
    :root {
        --neon-blue: #00f2ff;
        --neon-purple: #9d00ff;
        --bg: #0a0a0f;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    #bg-img {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        filter: blur(10px);
        z-index: -1;
        transform: scale(1.1);
    }

    .card {
        background: rgba(0, 0, 0, 0.7);
        padding: 35px;
        border-radius: 30px;
        border: 1px solid rgba(255,255,255,0.15);
        box-shadow: 0 0 40px rgba(0, 242, 255, 0.25);
        width: 90%;
        max-width: 900px;
        max-height: 90vh;
        overflow-y: auto;
    }

    h2 { text-align: center; color: var(--neon-blue); margin-top: 0; }
    input, select { padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--neon-blue); color: white; border-radius: 8px; width: 100%; margin-bottom: 12px; box-sizing: border-box; }
    button { padding: 12px 25px; cursor: pointer; background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: white; border: none; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 10px; }
    
    .results-title { color: var(--neon-blue); text-align: center; }
    .results-subtitle { text-align: center; font-size: 0.9rem; margin-bottom: 20px; opacity: 0.7; }
    .draft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .draft-card { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; padding: 10px; text-align: center; }
    .draft-player { font-weight: bold; color: var(--neon-blue); margin-bottom: 5px; }
    .team-line { font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .team-flag { width: 20px; height: 15px; object-fit: cover; }
</style>
</head>
<body>

<img id="bg-img" src="https://i.imgur.com/pe8d8Lj.jpeg" crossorigin="anonymous">

<div class="card" id="captureCard">
    <div id="step1">
        <label>Draft Title:</label>
        <input type="text" id="draftTitle" placeholder="2026 World Cup Draft">
        <label>Number of Players:</label>
        <input type="number" id="numPeople" value="8" min="1" max="48">
        <button onclick="goToStep2()">Continue</button>
    </div>

    <div id="step2" style="display:none;" id="s2">
        <div id="nameInputs"></div>
        <button onclick="prepareDraft()">Start Draft</button>
    </div>

    <div id="step3" style="display:none;" id="s3">
        <h2 id="finalTitle" class="results-title"></h2>
        <div id="drawDate" class="results-subtitle"></div>
        <div id="results" class="draft-grid"></div>
        <div style="text-align:center; margin-top:20px;">
            <button id="downloadBtn" onclick="downloadResults()">DOWNLOAD IMAGE</button>
        </div>
    </div>
</div>

<script>
// Mapping teams to their country codes for flag images
const teamData = [
    { name: "Argentina", code: "ar" }, { name: "Australia", code: "au" }, { name: "Austria", code: "at" },
    { name: "Belgium", code: "be" }, { name: "Brazil", code: "br" }, { name: "Canada", code: "ca" },
    { name: "Chile", code: "cl" }, { name: "Colombia", code: "co" }, { name: "Costa Rica", code: "cr" },
    { name: "Croatia", code: "hr" }, { name: "Denmark", code: "dk" }, { name: "Ecuador", code: "ec" },
    { name: "Egypt", code: "eg" }, { name: "England", code: "gb" }, { name: "France", code: "fr" },
    { name: "Germany", code: "de" }, { name: "Ghana", code: "gh" }, { name: "Greece", code: "gr" },
    { name: "Iran", code: "ir" }, { name: "Iraq", code: "iq" }, { name: "Italy", code: "it" },
    { name: "Ivory Coast", code: "ci" }, { name: "Japan", code: "jp" }, { name: "Mexico", code: "mx" },
    { name: "Morocco", code: "ma" }, { name: "Netherlands", code: "nl" }, { name: "New Zealand", code: "nz" },
    { name: "Nigeria", code: "ng" }, { name: "Norway", code: "no" }, { name: "Panama", code: "pa" },
    { name: "Paraguay", code: "py" }, { name: "Peru", code: "pe" }, { name: "Poland", code: "pl" },
    { name: "Portugal", code: "pt" }, { name: "Qatar", code: "qa" }, { name: "Saudi Arabia", code: "sa" },
    { name: "Senegal", code: "sn" }, { name: "Serbia", code: "rs" }, { name: "South Africa", code: "za" },
    { name: "South Korea", code: "kr" }, { name: "Spain", code: "es" }, { name: "Sweden", code: "se" },
    { name: "Switzerland", code: "ch" }, { name: "Tunisia", code: "tn" }, { name: "Türkiye", code: "tr" },
    { name: "Ukraine", code: "ua" }, { name: "United States", code: "us" }, { name: "Uruguay", code: "uy" }
];

function goToStep2() {
    let num = Math.max(1, Math.min(48, parseInt(document.getElementById('numPeople').value) || 1));
    const container = document.getElementById('nameInputs');
    container.innerHTML = Array.from({length:num}, (_,i) => `<input type="text" class="nameField" placeholder="Player ${i+1}">`).join('');
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

function prepareDraft() {
    const fields = document.querySelectorAll('.nameField');
    let players = Array.from(fields).map((f, i) => f.value.trim() || `Player ${i+1}`);
    players.sort(() => 0.5 - Math.random());
    
    let shuffledTeams = [...teamData].sort(() => 0.5 - Math.random());
    let playerState = players.map(name => ({name, teams: []}));
    shuffledTeams.forEach((team, index) => playerState[index % playerState.length].teams.push(team));

    document.getElementById("finalTitle").innerText = document.getElementById("draftTitle").value.trim() || "World Cup Draft";
    document.getElementById("drawDate").innerText = "Draw Date: " + new Date().toLocaleString();

    const container = document.getElementById('results');
    playerState.forEach(p => {
        container.innerHTML += `<div class="draft-card"><div class="draft-player">${p.name}</div>${p.teams.map(t => 
            `<div class="team-line"><img src="https://flagcdn.com/w20/${t.code}.png" class="team-flag"> ${t.name}</div>`
        ).join('')}</div>`;
    });

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
}

function downloadResults() {
    document.getElementById('downloadBtn').style.display = 'none';
    // Capture ONLY the card
    html2canvas(document.getElementById('captureCard'), { 
        backgroundColor: '#0a0a0f',
        useCORS: true,
        allowTaint: true
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'world-cup-draft.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        document.getElementById('downloadBtn').style.display = 'block';
    });
}
</script>
</body>
</html>
